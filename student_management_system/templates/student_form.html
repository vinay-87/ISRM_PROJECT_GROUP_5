<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ action }} Student</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>{{ action }} Student</h1>
                <p>Use the form below to manage student records.</p>
            </div>
        </header>
        <div class="card">
            <form method="post">
                <label>Name</label>
                <input type="text" name="name" value="{{ student.name if student else '' }}" required>
                <label>Email</label>
                <input type="email" name="email" value="{{ student.email if student else '' }}" required>
                <label>Course</label>
                <input type="text" name="course" value="{{ student.course if student else '' }}" required>
                <label>Year</label>
                <input type="text" name="year" value="{{ student.year if student else '' }}" required>
                <button type="submit">{{ action }}</button>
            </form>
            <p class="footer-note"><a href="/dashboard">Back to Dashboard</a></p>
        </div>
    </div>
</body>
</html>
