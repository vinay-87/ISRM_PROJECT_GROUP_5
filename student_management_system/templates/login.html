<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Management Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Student Management System</h1>
                <p>Academic vulnerability lab for authentication and data flow testing.</p>
            </div>
        </header>
        <div class="card">
            <h2>Login</h2>
            <form method="post">
                <label>Username</label>
                <input type="text" name="username" required>
                <label>Password</label>
                <input type="password" name="password" required>
                <button type="submit">Login</button>
            </form>
            <p class="footer-note">New user? <a href="/register">Register here</a></p>
        </div>
    </div>
</body>
</html>
